name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # prisma generate (postinstall) and the build never connect — a dummy
      # URL just satisfies the config.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/review_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
